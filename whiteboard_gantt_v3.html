<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月行事予定表｜情報ホワイトボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
    background: #e8e8e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }

  /* Top toolbar - subtle, outside the board */
  .toolbar {
    width: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .month-nav button {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid #bbb;
    background: #fff;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .month-nav button:hover { border-color: #1565c0; color: #1565c0; }

  .month-label {
    font-size: 16px;
    font-weight: 900;
    color: #333;
    min-width: 150px;
    text-align: center;
  }

  .kt-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #fff8e1;
    border: 1.5px solid #ffb300;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    color: #e65100;
  }

  .pills {
    display: flex;
    gap: 3px;
  }

  .pill {
    padding: 4px 10px;
    border-radius: 10px;
    border: 1.5px solid #ccc;
    background: #fff;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pill:hover { border-color: #1565c0; color: #1565c0; }
  .pill.active { border-color: #1565c0; background: #1565c0; color: #fff; }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #888;
  }

  /* 全画面ボタン */
  .fs-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1.5px solid #bbb;
    background: #fff;
    color: #666;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .fs-btn:hover { border-color: #1565c0; color: #1565c0; }
  .fs-btn svg { display: block; }

  /* ══ 全画面時のレイアウト（html.is-fullscreen 時） ══ */
  .is-fullscreen body {
    padding: 0;
    height: 100vh;
    overflow: hidden;
    align-items: stretch;   /* 幅方向を画面いっぱいに */
  }

  /* ツールバー：角丸なし・フル幅・マージンなし */
  .is-fullscreen .toolbar {
    max-width: 100%;
    border-radius: 0;
    margin-bottom: 0;
    flex-shrink: 0;
  }

  /* スクロールラッパー：残りの高さをすべて使う */
  .is-fullscreen .wb-scroll-wrapper {
    flex: 1;
    max-width: 100%;
    min-height: 0;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* コンテナ：幅制限を解除 */
  .is-fullscreen .wb-container {
    max-width: none;
  }

  /* ホワイトボード画像：高さを画面に合わせてフィット、幅は自動 */
  .is-fullscreen .wb-bg {
    width: auto;
    max-width: 100vw;
    /* JS が --toolbar-h をセット。フォールバックは 52px */
    max-height: calc(100vh - var(--toolbar-h, 52px));
  }

  /* ヒントは全画面時に非表示 */
  .is-fullscreen .hint {
    display: none;
  }

  /* ═══ Whiteboard container ═══ */
  .wb-container {
    width: 100%;
    max-width: 1400px;
    position: relative;
    /* Maintain whiteboard aspect ratio as base, but allow vertical growth */
  }

  /* The whiteboard image as background */
  .wb-bg {
    width: 100%;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  /* Overlay grid positioned on top of the image */
  .wb-overlay {
    position: absolute;
    /* These values map to the whiteboard grid area */
    /* Left edge of day-1 column to right edge of day-31 column */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* ═══ Row overlays on the whiteboard ═══ */
  .wb-rows {
    position: absolute;
    /* Grid area: from top of first data row to bottom of content */
    /* Calibrated to the whiteboard image grid lines */
    top: 14.5%;     /* below 日/曜 header rows */
    left: 7.2%;     /* right of 月行事予定表 label */
    width: 85.8%;   /* to left edge of 備考 column */
    bottom: 2%;
  }

  .wb-row {
    position: relative;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }

  .wb-row:hover {
    background: rgba(21, 101, 192, 0.04);
    border-radius: 2px;
  }

  .wb-row.expanded {
    background: rgba(21, 101, 192, 0.06);
  }

  /* Project label on the left of the row */
  .row-label {
    position: absolute;
    left: 0;
    top: 1px;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-start;
    padding-top: 2px;
    padding-left: 2px;
    pointer-events: none;
    z-index: 3;
  }

  .row-label-text {
    font-size: 10px;
    font-weight: 700;
    color: #1a1a2e;
    white-space: nowrap;
    text-shadow: 
      1px 1px 0 rgba(255,255,255,0.9),
      -1px -1px 0 rgba(255,255,255,0.9),
      1px -1px 0 rgba(255,255,255,0.9),
      -1px 1px 0 rgba(255,255,255,0.9),
      0 1px 0 rgba(255,255,255,0.9),
      0 -1px 0 rgba(255,255,255,0.9);
    line-height: 1.2;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-label-sub {
    font-size: 8px;
    font-weight: 500;
    color: #666;
    text-shadow: 
      1px 1px 0 rgba(255,255,255,0.9),
      -1px -1px 0 rgba(255,255,255,0.9);
  }

  /* ═══ Gantt bar (marker-drawn) ═══ */
  .gantt-bar {
    position: absolute;
    height: 55%;
    bottom: 4%;
    border-radius: 2px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    /* Marker-drawn feel */
    filter: saturate(0.85);
  }

  .gantt-bar:hover {
    transform: scaleY(1.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    filter: saturate(1);
    z-index: 4;
  }

  .gantt-bar .bar-text {
    font-size: 8px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    white-space: nowrap;
    padding: 0 3px;
    position: relative;
    z-index: 2;
  }

  .bar-prog {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: rgba(255,255,255,0.2);
    pointer-events: none;
  }

  /* Marker colors */
  .mc0 { background: #1565c0; }
  .mc1 { background: #00838f; }
  .mc2 { background: #c62828; }
  .mc3 { background: #2e7d32; }
  .mc4 { background: #6a1b9a; }
  .mc5 { background: #546e7a; }
  .mc6 { background: #e65100; }
  .mc7 { background: #00695c; }

  .bar-delayed {
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 3px,
      rgba(255,255,255,0.18) 3px, rgba(255,255,255,0.18) 6px
    ) !important;
  }

  /* Today line */
  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e65100;
    opacity: 0.5;
    z-index: 1;
    pointer-events: none;
  }

  /* ═══ Detail popup (slides down from the board) ═══ */
  .detail-popup {
    position: absolute;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 252, 0.97);
    border: 2px solid #b8bab0;
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    z-index: 20;
    overflow: hidden;
    transform-origin: top;
    animation: popIn 0.3s ease forwards;
    backdrop-filter: blur(4px);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scaleY(0.8); }
    to { opacity: 1; transform: scaleY(1); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(90deg, #1565c0, #0d47a1);
    color: #fff;
  }

  .detail-header h3 {
    font-size: 14px;
    font-weight: 700;
  }

  .detail-close {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .detail-close:hover { background: rgba(255,255,255,0.35); }

  .detail-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding: 14px 16px;
  }

  .db h4 {
    font-size: 11px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid rgba(21,101,192,0.12);
  }

  .di {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 11px;
    border-bottom: 1px dotted #e0e0d8;
  }

  .di:last-child { border-bottom: none; }
  .di-l { color: #888; }
  .di-v { color: #333; font-weight: 700; }

  .pbar {
    width: 100%;
    height: 7px;
    background: #e8e8e0;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 6px;
  }

  .pbar .fill { height: 100%; border-radius: 4px; }

  .stag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    border: 1.5px solid;
  }

  .stag-active { border-color: #2e7d32; color: #2e7d32; background: rgba(46,125,50,0.06); }
  .stag-upcoming { border-color: #1565c0; color: #1565c0; background: rgba(21,101,192,0.06); }
  .stag-delayed { border-color: #c62828; color: #c62828; background: rgba(198,40,40,0.06); }
  .stag-completed { border-color: #888; color: #888; background: rgba(0,0,0,0.03); }

  .ms-i {
    font-size: 10px;
    color: #666;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ms-i::before {
    content: '';
    width: 5px; height: 5px;
    background: #e65100;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nbox {
    font-size: 11px;
    color: #666;
    line-height: 1.6;
    margin-top: 4px;
    padding: 6px 8px;
    background: rgba(0,0,0,0.02);
    border-radius: 3px;
    border-left: 3px solid #e65100;
  }

  /* Hint */
  .hint {
    width: 100%;
    max-width: 1400px;
    text-align: right;
    padding: 6px 12px 0;
    font-size: 10px;
    font-weight: 600;
    color: #1565c0;
    animation: hblink 2.5s ease-in-out infinite;
  }

  @keyframes hblink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* Tooltip */
  .tip {
    position: fixed;
    background: #fff;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.12s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  }

  .tip.show { opacity: 1; }
  .tip-n { font-weight: 700; color: #333; }
  .tip-s { color: #888; font-size: 10px; margin-top: 2px; }

  /* ══ タッチデバイス：ホバーアニメ無効化 → active で代替 ══ */
  @media (hover: none) and (pointer: coarse) {
    .gantt-bar:hover {
      transform: none; box-shadow: none;
      filter: saturate(0.85); z-index: 2;
    }
    .gantt-bar:active {
      transform: scaleY(1.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      filter: saturate(1); z-index: 4;
    }
    .month-nav button:hover { border-color: #bbb; color: #666; }
    .pill:hover { border-color: #ccc; color: #888; }
    .wb-row:hover { background: none; }
    .wb-row:active { background: rgba(21,101,192,0.06); border-radius: 2px; }
  }

  /* ══ タブレット（≤ 900px） ══ */
  @media (max-width: 900px) {
    body { padding: 6px; }
    .toolbar { flex-wrap: wrap; gap: 6px; }
    .toolbar-right { display: none; }
    .pills { overflow-x: auto; padding-bottom: 2px; }
    .month-nav button { width: 36px; height: 36px; font-size: 14px; }
    .pill { padding: 5px 11px; }
    .detail-body { grid-template-columns: 1fr; }
  }

  /* ══ スマートフォン（≤ 540px） ══ */
  @media (max-width: 540px) {
    body { padding: 4px; }
    .toolbar { gap: 4px; padding: 6px 8px; }
    .toolbar-left { flex-wrap: wrap; gap: 5px; }
    .month-nav button { width: 44px; height: 44px; font-size: 16px; }
    .month-label { font-size: 14px; min-width: 110px; }
    .kt-tag { font-size: 9px; }
    .pill { padding: 7px 12px; font-size: 11px; }
    .row-label-text { font-size: 12px; }
    .row-label-sub { font-size: 9px; }
    .gantt-bar .bar-text { font-size: 10px; }
    .gantt-bar { height: 65%; }
    .hint { font-size: 12px; padding: 8px 12px 4px; text-align: center; }
  }

  /* ══ ホワイトボード横スクロール ══ */
  .wb-scroll-wrapper {
    width: 100%;
    max-width: 1400px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #bbb #f0f0ea;
  }
  .wb-scroll-wrapper::-webkit-scrollbar { height: 4px; }
  .wb-scroll-wrapper::-webkit-scrollbar-track { background: #f0f0ea; border-radius: 2px; }
  .wb-scroll-wrapper::-webkit-scrollbar-thumb { background: #bbb; border-radius: 2px; }

  @media (max-width: 900px) {
    .wb-container { min-width: 640px; }
  }
  @media (max-width: 540px) {
    .wb-container { min-width: 560px; }
  }

  /* ══ モバイル：詳細をボトムシートモーダルで表示 ══ */
  .detail-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 998;
    animation: fadeIn 0.2s ease forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .detail-popup.mobile-modal {
    position: fixed !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    top: auto !important;
    width: 100% !important;
    max-height: 82vh;
    overflow-y: auto;
    border-radius: 14px 14px 0 0;
    z-index: 999;
    animation: slideUp 0.3s ease forwards;
  }
  /* モバイルモーダルのドラッグハンドル */
  .detail-popup.mobile-modal::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    background: #ccc;
    border-radius: 2px;
    margin: 8px auto 0;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ══ 現場カメラボタン ══ */
  .cam-btn {
    position: absolute;
    right: 2%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: #c62828;
    color: #fff;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 5px rgba(0,0,0,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    padding: 0;
  }
  .cam-btn:hover {
    transform: translateY(-50%) scale(1.2);
    box-shadow: 0 2px 10px rgba(198,40,40,0.5);
  }
  /* 赤いパルスリング（ライブ中感） */
  .cam-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid #e53935;
    animation: camPulse 1.8s ease-out infinite;
    pointer-events: none;
  }
  @keyframes camPulse {
    0%   { transform: scale(1);   opacity: 0.9; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* ══ 現場カメラ モーダル ══ */
  .cam-modal {
    position: fixed;
    inset: 0;
    z-index: 3000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease forwards;
  }
  .cam-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    cursor: pointer;
  }
  .cam-dialog {
    position: relative;
    z-index: 1;
    width: min(900px, 96vw);
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    animation: popIn 0.25s ease forwards;
  }
  .cam-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: linear-gradient(90deg, #b71c1c, #c62828);
    color: #fff;
  }
  .cam-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  .cam-live-dot {
    width: 8px; height: 8px;
    background: #ff5252;
    border-radius: 50%;
    animation: camPulse 1.2s ease-out infinite;
    flex-shrink: 0;
  }
  .cam-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .cam-close:hover { background: rgba(255,255,255,0.35); }
  .cam-frame-wrap {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .cam-frame-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<!-- Toolbar (outside the board) -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="month-nav">
      <button id="prevM">◀</button>
      <span class="month-label" id="mLabel"></span>
      <button id="nextM">▶</button>
    </div>
    <div class="kt-tag">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#e65100" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#e65100"/></svg>
      kintone
    </div>
    <div class="pills">
      <button class="pill active" data-f="all">全件</button>
      <button class="pill" data-f="active">施工中</button>
      <button class="pill" data-f="upcoming">予定</button>
      <button class="pill" data-f="delayed">遅延</button>
      <button class="pill" data-f="completed">完了</button>
    </div>
  </div>
  <div class="toolbar-right">
    <button class="fs-btn" id="fsBtn" title="全画面表示">
      <!-- 全画面ON アイコン（4隅矢印） -->
      <svg id="fsIconExpand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <!-- 全画面OFF アイコン（縮小） -->
      <svg id="fsIconCompress" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
      </svg>
    </button>
    <span id="clock"></span>
  </div>
</div>

<!-- Whiteboard（小画面では横スクロール） -->

</div>

<script>
// ═══ Data ═══
const P = [
  { id:"KJ-2026-001", name:"鹿児島市役所 本庁舎改修工事", client:"鹿児島市", mgr:"田中 太郎",

  { id:"KJ-2026-004", name:"城山展望台 休憩施設新築", client:"鹿児島市観光課", mgr:"中村 美咲",

  { id:"KJ-2026-007", name:"谷山駅前 再開発ビル基礎工事", client:"谷山駅前再開発組合", mgr:"伊藤 大輔",
    status:"active", s:"2026-01-20", e:"2026-07-31", prog:30,
    budget:420000000, spent:118000000, cat:"建築", loc:"鹿児島市谷山中央1丁目", wk:45,
    notes:"杭打ち完了。地下躯体工事に移行中。",
    ms:["杭完了 (3/01)","地下躯体 (5/15)","1F床 (7/31)"],
    cam:"https://www.youtube.com/embed/Hmmk0eYn0cw?autoplay=1" },
  { id:"KJ-2026-008", name:"指宿スカイライン 法面補修", client:"NEXCO西日本", mgr:"渡辺 裕子",
    status:"upcoming", s:"2026-04-15", e:"2026-06-15", prog:0,
    budget:52000000, spent:0, cat:"道路", loc:"鹿児島市田上8丁目", wk:0,
    notes:"片側交互通行規制あり。夜間作業主体。",
    ms:["着手 (4/15)","モルタル吹付 (5/20)","完了 (6/15)"],
    cam:"https://www.youtube.com/embed/Hmmk0eYn0cw?autoplay=1" }
];

const SL={active:'施工中',upcoming:'着工予定',delayed:'遅延',completed:'完了'};
const today=new Date(2026,2,23);
const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let vY=2026, vM=2, filt='all', openId=null;

function dim(y,m){return new Date(y,m+1,0).getDate();}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function yen(n){
  if(n>=100000000)return(n/100000000).toFixed(1)+'億円';
  if(n>=10000)return Math.round(n/10000).toLocaleString()+'万円';
  return n.toLocaleString()+'円';
}
function fl(){return filt==='all'?P:P.filter(p=>p.status===filt);}

// ═══ Grid calibration ═══
// These percentages map to the whiteboard image grid
// Horizontal: day columns span from ~7.5% (day 1 left edge) to ~91.5% (day 31 right edge)
const GRID_LEFT = 7.8;   // % from left where day-1 starts
const GRID_RIGHT = 91.0; // % from left where day-31 ends
const GRID_WIDTH = GRID_RIGHT - GRID_LEFT;

// Vertical: rows area
// The wb-rows div already handles top/bottom positioning
// We divide available height evenly among visible projects

function render() {
  const days = dim(vY, vM);
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mLabel').textContent = `${vY}年 ${mn[vM]}`;

  const list = fl();
  const container = document.getElementById('wbRows');
  container.innerHTML = '';

  // Calculate row height - distribute evenly across available space
  // The whiteboard has ~8 visible row lines
  const maxRows = Math.max(list.length, 1);
  const rowH = 100 / maxRows;

  list.forEach((p, idx) => {
    const ci = idx % 8;

    // Row element
    const row = document.createElement('div');
    row.className = `wb-row ${openId===p.id?'expanded':''}`;
    row.style.cssText = `height:${rowH}%;position:relative;`;
    row.onclick = () => toggleDetail(p.id, row);

    // Label text (project name above the bar)
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.innerHTML = `<div><div class="row-label-text">${p.name}</div><div class="row-label-sub">${p.mgr}　${p.s}～${p.e}</div></div>`;
    row.appendChild(lbl);

    // Gantt bar
    const pS = pd(p.s), pE = pd(p.e);
    const mS = new Date(vY, vM, 1), mE = new Date(vY, vM, days);

    if (pS <= mE && pE >= mS) {
      const sd = pS < mS ? 1 : pS.getDate();
      const ed = pE > mE ? days : pE.getDate();

      // Position as % of the wb-rows area (which already starts at GRID_LEFT)
      // But wb-rows spans the full grid area, so we need to map day columns within it
      // Day columns occupy from 0% to ~97% of wb-rows width (since wb-rows left=7.2%, width=85.8%)
      // Actually, the day columns within the whiteboard start right at the wb-rows left edge
      // and end before the 備考 column

      // Within wb-rows: day 1 starts at 0%, day 31 ends at ~96%
      const dayWidth = 96.0 / days;
      const barLeft = (sd - 1) * dayWidth;
      const barWidth = (ed - sd + 1) * dayWidth;

      const bar = document.createElement('div');
      bar.className = `gantt-bar mc${ci} ${p.status === 'delayed' ? 'bar-delayed' : ''}`;
      bar.style.cssText = `left:${barLeft}%;width:${barWidth}%;`;

      bar.innerHTML = `<div class="bar-prog" style="width:${p.prog}%"></div>
        <span class="bar-text">${p.prog > 0 ? p.prog + '%' : ''}</span>`;

      if (!isTouch) {
        bar.onmouseenter = (ev) => showTip(ev, p);
        bar.onmouseleave = hideTip;
      }
      bar.onclick = (ev) => { ev.stopPropagation(); toggleDetail(p.id, row); };

      row.appendChild(bar);
    }

    // Today line
    if (vY === today.getFullYear() && vM === today.getMonth()) {
      const dayWidth = 96.0 / days;
      const tl = document.createElement('div');
      tl.className = 'today-line';
      tl.style.left = `${(today.getDate() - 0.5) * dayWidth}%`;
      row.appendChild(tl);
    }

    // 現場カメラボタン
    if (p.cam) {
      const cb = document.createElement('button');
      cb.className = 'cam-btn';
      cb.title = `${p.name}　現場ライブカメラ`;
      cb.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>';
      cb.onclick = (ev) => { ev.stopPropagation(); openCam(p.cam, p.name); };
      row.appendChild(cb);
    }

    container.appendChild(row);
  });
}

// ═══ Detail popup ═══
function toggleDetail(id, rowEl) {
  // Remove existing popup
  const existing = document.querySelector('.detail-popup');
  if (existing) {
    existing.remove();
    if (openId === id) { openId = null; render(); return; }
  }

  openId = id;
  render();

  // Re-find the row after render
  const rows = document.querySelectorAll('.wb-row');
  let targetRow = null;
  const list = fl();
  list.forEach((p, i) => {
    if (p.id === id && rows[i]) targetRow = rows[i];
  });

  const p = P.find(x => x.id === id);
  if (!p || !targetRow) return;

  const popup = document.createElement('div');
  const isMobile = window.innerWidth <= 768;
  popup.className = 'detail-popup' + (isMobile ? ' mobile-modal' : '');

  const container = document.getElementById('wbRows');

  if (!isMobile) {
    // PC: ホワイトボード内の行の直下に表示
    const containerRect = container.getBoundingClientRect();
    const rowRect = targetRow.getBoundingClientRect();
    popup.style.top = (rowRect.bottom - containerRect.top) + 'px';
  }

  popup.innerHTML = `
    <div class="detail-header">
      <h3>${p.name}</h3>
      <button class="detail-close" onclick="event.stopPropagation();closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="db">
        <h4>📌 基本情報</h4>
        <div class="di"><span class="di-l">工事番号</span><span class="di-v">${p.id}</span></div>
        <div class="di"><span class="di-l">発注者</span><span class="di-v">${p.client}</span></div>
        <div class="di"><span class="di-l">現場代理人</span><span class="di-v">${p.mgr}</span></div>
        <div class="di"><span class="di-l">分類</span><span class="di-v">${p.cat}</span></div>
        <div class="di"><span class="di-l">現場住所</span><span class="di-v">${p.loc}</span></div>
        <div class="di"><span class="di-l">作業員数</span><span class="di-v">${p.wk}名</span></div>
        <div class="di"><span class="di-l">ステータス</span><span class="stag stag-${p.status}">${SL[p.status]}</span></div>
      </div>
      <div class="db">
        <h4>📊 工期・進捗</h4>
        <div class="di"><span class="di-l">工期</span><span class="di-v">${p.s} ～ ${p.e}</span></div>
        <div class="di"><span class="di-l">進捗率</span><span class="di-v">${p.prog}%</span></div>
        <div class="pbar"><div class="fill" style="width:${p.prog}%;background:${p.status==='delayed'?'#c62828':p.status==='completed'?'#888':'#2e7d32'}"></div></div>
        <h4 style="margin-top:12px;">🚩 マイルストーン</h4>
        ${p.ms.map(m => `<div class="ms-i">${m}</div>`).join('')}
      </div>
      <div class="db">
        <h4>💰 予算</h4>
        <div class="di"><span class="di-l">請負金額</span><span class="di-v">${yen(p.budget)}</span></div>
        <div class="di"><span class="di-l">実行額</span><span class="di-v">${yen(p.spent)}</span></div>
        <div class="di"><span class="di-l">執行率</span><span class="di-v">${p.budget>0?Math.round(p.spent/p.budget*100):0}%</span></div>
        <div class="pbar"><div class="fill" style="width:${p.budget>0?Math.round(p.spent/p.budget*100):0}%;background:#e65100"></div></div>
        <h4 style="margin-top:12px;">📝 備考</h4>
        <div class="nbox">${p.notes}</div>
      </div>
    </div>
  `;

  if (isMobile) {
    // モバイル: バックドロップ追加 → body に append
    const bd = document.createElement('div');
    bd.className = 'detail-backdrop';
    bd.id = 'detailBackdrop';
    bd.onclick = closeDetail;
    document.body.appendChild(bd);
    document.body.appendChild(popup);
  } else {
    container.appendChild(popup);
  }
}

function closeDetail() {
  const existing = document.querySelector('.detail-popup');
  if (existing) existing.remove();
  const bd = document.getElementById('detailBackdrop');
  if (bd) bd.remove();
  openId = null;
  render();
}

// Tooltip
function showTip(ev, p) {
  const t = document.getElementById('tip');
  t.innerHTML = `<div class="tip-n">${p.name}</div><div class="tip-s">${p.mgr}　${p.cat}　進捗${p.prog}%</div><div class="tip-s">${p.s} ～ ${p.e}</div>`;
  t.classList.add('show');
  mvTip(ev);
}
function mvTip(ev) {
  const t = document.getElementById('tip');
  t.style.left = (ev.clientX + 14) + 'px';
  t.style.top = (ev.clientY - 8) + 'px';
}
document.addEventListener('mousemove', ev => {
  if (document.getElementById('tip').classList.contains('show')) mvTip(ev);
});
function hideTip() { document.getElementById('tip').classList.remove('show'); }

// Filters
document.querySelectorAll('.pill').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filt = b.dataset.f;
    openId = null;
    closeDetail();
    render();
  });
});

// Month nav
document.getElementById('prevM').onclick = () => { vM--; if(vM<0){vM=11;vY--;} openId=null; closeDetail(); render(); };
document.getElementById('nextM').onclick = () => { vM++; if(vM>11){vM=0;vY++;} openId=null; closeDetail(); render(); };

// Resize（縦横回転・ウィンドウ変更時にポップアップ閉じて再描画）
window.addEventListener('resize', () => { closeDetail(); render(); });
window.addEventListener('orientationchange', () => { closeDetail(); render(); });

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

// ═══ 現場カメラ ═══
function openCam(url, name) {
  document.getElementById('camTitle').textContent = name + '　現場ライブカメラ';
  document.getElementById('camFrame').src = url;
  const modal = document.getElementById('camModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeCam() {
  document.getElementById('camModal').style.display = 'none';
  document.getElementById('camFrame').src = ''; // 動画停止
  document.body.style.overflow = '';
}

document.getElementById('camClose').addEventListener('click', closeCam);
document.getElementById('camBackdrop').addEventListener('click', closeCam);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCam();
});

// ═══ 全画面切替 ═══
function getFsElement() {
  return document.fullscreenElement || document.webkitFullscreenElement || null;
}

function updateFsIcon(active) {
  document.getElementById('fsIconExpand').style.display   = active ? 'none'  : 'block';
  document.getElementById('fsIconCompress').style.display = active ? 'block' : 'none';
  document.getElementById('fsBtn').title = active ? '全画面を解除 (Esc)' : '全画面表示';
  document.documentElement.classList.toggle('is-fullscreen', active);

  // ツールバーの実際の高さを CSS 変数で渡し、画像の max-height を動的に計算
  if (active) {
    const tbH = document.querySelector('.toolbar').offsetHeight;
    document.documentElement.style.setProperty('--toolbar-h', tbH + 'px');
  } else {
    document.documentElement.style.removeProperty('--toolbar-h');
  }
}

document.getElementById('fsBtn').addEventListener('click', () => {
  if (!getFsElement()) {
    const req = document.documentElement.requestFullscreen
      || document.documentElement.webkitRequestFullscreen;
    if (req) req.call(document.documentElement).catch(() => {});
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document).catch(() => {});
  }
});

// fullscreenchange（Safari は webkit プレフィックス）
['fullscreenchange', 'webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    const active = !!getFsElement();
    updateFsIcon(active);
    closeDetail();
    render();
  });
});

// Init
render(); tick(); setInterval(tick, 30000);
</script>
