<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月行事予定表｜情報ホワイトボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
    background: #e8e8e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }

  /* Top toolbar - subtle, outside the board */
  .toolbar {
    width: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .month-nav button {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid #bbb;
    background: #fff;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .month-nav button:hover { border-color: #1565c0; color: #1565c0; }

  .month-label {
    font-size: 16px;
    font-weight: 900;
    color: #333;
    min-width: 150px;
    text-align: center;
  }

  .kt-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #fff8e1;
    border: 1.5px solid #ffb300;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    color: #e65100;
  }

  .pills {
    display: flex;
    gap: 3px;
  }

  .pill {
    padding: 4px 10px;
    border-radius: 10px;
    border: 1.5px solid #ccc;
    background: #fff;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pill:hover { border-color: #1565c0; color: #1565c0; }
  .pill.active { border-color: #1565c0; background: #1565c0; color: #fff; }

  .toolbar-right {
    font-size: 11px;
    color: #888;
  }

  /* ═══ Whiteboard container ═══ */
  .wb-container {
    width: 100%;
    max-width: 1400px;
    position: relative;
    /* Maintain whiteboard aspect ratio as base, but allow vertical growth */
  }

  /* The whiteboard image as background */
  .wb-bg {
    width: 100%;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  /* Overlay grid positioned on top of the image */
  .wb-overlay {
    position: absolute;
    /* These values map to the whiteboard grid area */
    /* Left edge of day-1 column to right edge of day-31 column */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* ═══ Row overlays on the whiteboard ═══ */
  .wb-rows {
    position: absolute;
    /* Grid area: from top of first data row to bottom of content */
    /* Calibrated to the whiteboard image grid lines */
    top: 14.5%;     /* below 日/曜 header rows */
    left: 7.2%;     /* right of 月行事予定表 label */
    width: 85.8%;   /* to left edge of 備考 column */
    bottom: 2%;
  }

  .wb-row {
    position: relative;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }

  .wb-row:hover {
    background: rgba(21, 101, 192, 0.04);
    border-radius: 2px;
  }

  .wb-row.expanded {
    background: rgba(21, 101, 192, 0.06);
  }

  /* Project label on the left of the row */
  .row-label {
    position: absolute;
    left: 0;
    top: 1px;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-start;
    padding-top: 2px;
    padding-left: 2px;
    pointer-events: none;
    z-index: 3;
  }

  .row-label-text {
    font-size: 10px;
    font-weight: 700;
    color: #1a1a2e;
    white-space: nowrap;
    text-shadow: 
      1px 1px 0 rgba(255,255,255,0.9),
      -1px -1px 0 rgba(255,255,255,0.9),
      1px -1px 0 rgba(255,255,255,0.9),
      -1px 1px 0 rgba(255,255,255,0.9),
      0 1px 0 rgba(255,255,255,0.9),
      0 -1px 0 rgba(255,255,255,0.9);
    line-height: 1.2;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-label-sub {
    font-size: 8px;
    font-weight: 500;
    color: #666;
    text-shadow: 
      1px 1px 0 rgba(255,255,255,0.9),
      -1px -1px 0 rgba(255,255,255,0.9);
  }

  /* ═══ Gantt bar (marker-drawn) ═══ */
  .gantt-bar {
    position: absolute;
    height: 55%;
    bottom: 4%;
    border-radius: 2px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    /* Marker-drawn feel */
    filter: saturate(0.85);
  }

  .gantt-bar:hover {
    transform: scaleY(1.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    filter: saturate(1);
    z-index: 4;
  }

  .gantt-bar .bar-text {
    font-size: 8px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    white-space: nowrap;
    padding: 0 3px;
    position: relative;
    z-index: 2;
  }

  .bar-prog {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: rgba(255,255,255,0.2);
    pointer-events: none;
  }

  /* Marker colors */
  .mc0 { background: #1565c0; }
  .mc1 { background: #00838f; }
  .mc2 { background: #c62828; }
  .mc3 { background: #2e7d32; }
  .mc4 { background: #6a1b9a; }
  .mc5 { background: #546e7a; }
  .mc6 { background: #e65100; }
  .mc7 { background: #00695c; }

  .bar-delayed {
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 3px,
      rgba(255,255,255,0.18) 3px, rgba(255,255,255,0.18) 6px
    ) !important;
  }

  /* Today line */
  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e65100;
    opacity: 0.5;
    z-index: 1;
    pointer-events: none;
  }

  /* ═══ Detail popup (slides down from the board) ═══ */
  .detail-popup {
    position: absolute;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 252, 0.97);
    border: 2px solid #b8bab0;
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    z-index: 20;
    overflow: hidden;
    transform-origin: top;
    animation: popIn 0.3s ease forwards;
    backdrop-filter: blur(4px);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scaleY(0.8); }
    to { opacity: 1; transform: scaleY(1); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(90deg, #1565c0, #0d47a1);
    color: #fff;
  }

  .detail-header h3 {
    font-size: 14px;
    font-weight: 700;
  }

  .detail-close {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .detail-close:hover { background: rgba(255,255,255,0.35); }

  .detail-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding: 14px 16px;
  }

  .db h4 {
    font-size: 11px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid rgba(21,101,192,0.12);
  }

  .di {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 11px;
    border-bottom: 1px dotted #e0e0d8;
  }

  .di:last-child { border-bottom: none; }
  .di-l { color: #888; }
  .di-v { color: #333; font-weight: 700; }

  .pbar {
    width: 100%;
    height: 7px;
    background: #e8e8e0;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 6px;
  }

  .pbar .fill { height: 100%; border-radius: 4px; }

  .stag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    border: 1.5px solid;
  }

  .stag-active { border-color: #2e7d32; color: #2e7d32; background: rgba(46,125,50,0.06); }
  .stag-upcoming { border-color: #1565c0; color: #1565c0; background: rgba(21,101,192,0.06); }
  .stag-delayed { border-color: #c62828; color: #c62828; background: rgba(198,40,40,0.06); }
  .stag-completed { border-color: #888; color: #888; background: rgba(0,0,0,0.03); }

  .ms-i {
    font-size: 10px;
    color: #666;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ms-i::before {
    content: '';
    width: 5px; height: 5px;
    background: #e65100;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nbox {
    font-size: 11px;
    color: #666;
    line-height: 1.6;
    margin-top: 4px;
    padding: 6px 8px;
    background: rgba(0,0,0,0.02);
    border-radius: 3px;
    border-left: 3px solid #e65100;
  }

  /* Hint */
  .hint {
    width: 100%;
    max-width: 1400px;
    text-align: right;
    padding: 6px 12px 0;
    font-size: 10px;
    font-weight: 600;
    color: #1565c0;
    animation: hblink 2.5s ease-in-out infinite;
  }

  @keyframes hblink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* Tooltip */
  .tip {
    position: fixed;
    background: #fff;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.12s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  }

  .tip.show { opacity: 1; }
  .tip-n { font-weight: 700; color: #333; }
  .tip-s { color: #888; font-size: 10px; margin-top: 2px; }

  @media (max-width: 900px) {
    .detail-body { grid-template-columns: 1fr; }
    body { padding: 4px; }
    .toolbar { flex-wrap: wrap; gap: 6px; }
  }
</style>
</head>
<body>

<!-- Toolbar (outside the board) -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="month-nav">
      <button id="prevM">◀</button>
      <span class="month-label" id="mLabel"></span>
      <button id="nextM">▶</button>
    </div>
    <div class="kt-tag">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#e65100" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#e65100"/></svg>
      kintone
    </div>
    <div class="pills">
      <button class="pill active" data-f="all">全件</button>
      <button class="pill" data-f="active">施工中</button>
      <button class="pill" data-f="upcoming">予定</button>
      <button class="pill" data-f="delayed">遅延</button>
      <button class="pill" data-f="completed">完了</button>
    </div>
  </div>
  <div class="toolbar-right" id="clock"></div>
</div>

<!-- Whiteboard -->
<div class="wb-container" id="wbContainer">
  <img src="whiteboard_bg.png" class="wb-bg" id="wbImg" alt="whiteboard">
  <div class="wb-overlay">
    <div class="wb-rows" id="wbRows"></div>
  </div>
</div>

<div class="hint">👆 バーまたは行を押下すると工事詳細が展開されます</div>

<!-- Tooltip -->
<div class="tip" id="tip"></div>

<script>
// ═══ Data ═══
const P = [
  { id:"KJ-2026-001", name:"鹿児島市役所 本庁舎改修工事", client:"鹿児島市", mgr:"田中 太郎",
    status:"active", s:"2026-02-10", e:"2026-05-30", prog:45,
    budget:158000000, spent:68500000, cat:"公共建築", loc:"鹿児島市山下町11-1", wk:24,
    notes:"2F〜4Fの内装改修。3月末までに2F完了予定。",
    ms:["2F完了 (3/31)","3F完了 (4/30)","検査 (5/25)"] },
  { id:"KJ-2026-002", name:"天文館通り 道路拡幅工事", client:"鹿児島県", mgr:"山田 花子",
    status:"active", s:"2026-01-15", e:"2026-04-15", prog:68,
    budget:92000000, spent:61200000, cat:"土木", loc:"鹿児島市千日町", wk:18,
    notes:"夜間工事区間あり（22:00-5:00）。騒音対策実施中。",
    ms:["路盤完了 (3/15)","舗装 (4/01)","開放 (4/15)"] },
  { id:"KJ-2026-003", name:"桜島フェリーターミナル 耐震補強", client:"鹿児島市船舶部", mgr:"佐藤 健一",
    status:"delayed", s:"2025-11-01", e:"2026-03-31", prog:52,
    budget:245000000, spent:142000000, cat:"港湾", loc:"鹿児島市桜島横山町", wk:32,
    notes:"⚠ 資材調達遅延により2週間の工期遅れ。完了予定4/14に変更。",
    ms:["基礎完了 (1/31)","上部工 (3/15)","完了予定 (4/14)"] },
  { id:"KJ-2026-004", name:"城山展望台 休憩施設新築", client:"鹿児島市観光課", mgr:"中村 美咲",
    status:"upcoming", s:"2026-04-01", e:"2026-08-31", prog:0,
    budget:78000000, spent:0, cat:"建築", loc:"鹿児島市城山町", wk:0,
    notes:"4月着工予定。景観審査は3月に承認済み。",
    ms:["着工 (4/01)","上棟 (6/15)","竣工 (8/31)"] },
  { id:"KJ-2026-005", name:"甲突川 護岸修繕工事", client:"鹿児島県土木部", mgr:"鈴木 一郎",
    status:"active", s:"2026-03-01", e:"2026-06-30", prog:18,
    budget:64000000, spent:9800000, cat:"河川", loc:"鹿児島市甲突町", wk:12,
    notes:"渇水期に合わせた施工。梅雨前の完了を目指す。",
    ms:["仮締切 (3/10)","本体工 (5/01)","撤去 (6/25)"] },
  { id:"KJ-2026-006", name:"鴨池運動公園 照明LED化", client:"鹿児島市", mgr:"高橋 誠",
    status:"completed", s:"2025-12-01", e:"2026-02-28", prog:100,
    budget:35000000, spent:33200000, cat:"電気設備", loc:"鹿児島市与次郎2丁目", wk:0,
    notes:"全灯具のLED化完了。検査合格済み。",
    ms:["野球場完了 (1/15)","陸上競技場 (2/10)","検査 (2/25)"] },
  { id:"KJ-2026-007", name:"谷山駅前 再開発ビル基礎工事", client:"谷山駅前再開発組合", mgr:"伊藤 大輔",
    status:"active", s:"2026-01-20", e:"2026-07-31", prog:30,
    budget:420000000, spent:118000000, cat:"建築", loc:"鹿児島市谷山中央1丁目", wk:45,
    notes:"杭打ち完了。地下躯体工事に移行中。",
    ms:["杭完了 (3/01)","地下躯体 (5/15)","1F床 (7/31)"] },
  { id:"KJ-2026-008", name:"指宿スカイライン 法面補修", client:"NEXCO西日本", mgr:"渡辺 裕子",
    status:"upcoming", s:"2026-04-15", e:"2026-06-15", prog:0,
    budget:52000000, spent:0, cat:"道路", loc:"鹿児島市田上8丁目", wk:0,
    notes:"片側交互通行規制あり。夜間作業主体。",
    ms:["着手 (4/15)","モルタル吹付 (5/20)","完了 (6/15)"] }
];

const SL={active:'施工中',upcoming:'着工予定',delayed:'遅延',completed:'完了'};
const today=new Date(2026,2,23);
let vY=2026, vM=2, filt='all', openId=null;

function dim(y,m){return new Date(y,m+1,0).getDate();}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function yen(n){
  if(n>=100000000)return(n/100000000).toFixed(1)+'億円';
  if(n>=10000)return Math.round(n/10000).toLocaleString()+'万円';
  return n.toLocaleString()+'円';
}
function fl(){return filt==='all'?P:P.filter(p=>p.status===filt);}

// ═══ Grid calibration ═══
// These percentages map to the whiteboard image grid
// Horizontal: day columns span from ~7.5% (day 1 left edge) to ~91.5% (day 31 right edge)
const GRID_LEFT = 7.8;   // % from left where day-1 starts
const GRID_RIGHT = 91.0; // % from left where day-31 ends
const GRID_WIDTH = GRID_RIGHT - GRID_LEFT;

// Vertical: rows area
// The wb-rows div already handles top/bottom positioning
// We divide available height evenly among visible projects

function render() {
  const days = dim(vY, vM);
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mLabel').textContent = `${vY}年 ${mn[vM]}`;

  const list = fl();
  const container = document.getElementById('wbRows');
  container.innerHTML = '';

  // Calculate row height - distribute evenly across available space
  // The whiteboard has ~8 visible row lines
  const maxRows = Math.max(list.length, 1);
  const rowH = 100 / maxRows;

  list.forEach((p, idx) => {
    const ci = idx % 8;

    // Row element
    const row = document.createElement('div');
    row.className = `wb-row ${openId===p.id?'expanded':''}`;
    row.style.cssText = `height:${rowH}%;position:relative;`;
    row.onclick = () => toggleDetail(p.id, row);

    // Label text (project name above the bar)
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.innerHTML = `<div><div class="row-label-text">${p.name}</div><div class="row-label-sub">${p.mgr}　${p.s}～${p.e}</div></div>`;
    row.appendChild(lbl);

    // Gantt bar
    const pS = pd(p.s), pE = pd(p.e);
    const mS = new Date(vY, vM, 1), mE = new Date(vY, vM, days);

    if (pS <= mE && pE >= mS) {
      const sd = pS < mS ? 1 : pS.getDate();
      const ed = pE > mE ? days : pE.getDate();

      // Position as % of the wb-rows area (which already starts at GRID_LEFT)
      // But wb-rows spans the full grid area, so we need to map day columns within it
      // Day columns occupy from 0% to ~97% of wb-rows width (since wb-rows left=7.2%, width=85.8%)
      // Actually, the day columns within the whiteboard start right at the wb-rows left edge
      // and end before the 備考 column

      // Within wb-rows: day 1 starts at 0%, day 31 ends at ~96%
      const dayWidth = 96.0 / days;
      const barLeft = (sd - 1) * dayWidth;
      const barWidth = (ed - sd + 1) * dayWidth;

      const bar = document.createElement('div');
      bar.className = `gantt-bar mc${ci} ${p.status === 'delayed' ? 'bar-delayed' : ''}`;
      bar.style.cssText = `left:${barLeft}%;width:${barWidth}%;`;

      bar.innerHTML = `<div class="bar-prog" style="width:${p.prog}%"></div>
        <span class="bar-text">${p.prog > 0 ? p.prog + '%' : ''}</span>`;

      bar.onmouseenter = (ev) => showTip(ev, p);
      bar.onmouseleave = hideTip;
      bar.onclick = (ev) => { ev.stopPropagation(); toggleDetail(p.id, row); };

      row.appendChild(bar);
    }

    // Today line
    if (vY === today.getFullYear() && vM === today.getMonth()) {
      const dayWidth = 96.0 / days;
      const tl = document.createElement('div');
      tl.className = 'today-line';
      tl.style.left = `${(today.getDate() - 0.5) * dayWidth}%`;
      row.appendChild(tl);
    }

    container.appendChild(row);
  });
}

// ═══ Detail popup ═══
function toggleDetail(id, rowEl) {
  // Remove existing popup
  const existing = document.querySelector('.detail-popup');
  if (existing) {
    existing.remove();
    if (openId === id) { openId = null; render(); return; }
  }

  openId = id;
  render();

  // Re-find the row after render
  const rows = document.querySelectorAll('.wb-row');
  let targetRow = null;
  const list = fl();
  list.forEach((p, i) => {
    if (p.id === id && rows[i]) targetRow = rows[i];
  });

  const p = P.find(x => x.id === id);
  if (!p || !targetRow) return;

  const popup = document.createElement('div');
  popup.className = 'detail-popup';

  // Position below the row
  const container = document.getElementById('wbRows');
  const containerRect = container.getBoundingClientRect();
  const rowRect = targetRow.getBoundingClientRect();
  const topPos = rowRect.bottom - containerRect.top;

  popup.style.top = topPos + 'px';

  popup.innerHTML = `
    <div class="detail-header">
      <h3>${p.name}</h3>
      <button class="detail-close" onclick="event.stopPropagation();closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="db">
        <h4>📌 基本情報</h4>
        <div class="di"><span class="di-l">工事番号</span><span class="di-v">${p.id}</span></div>
        <div class="di"><span class="di-l">発注者</span><span class="di-v">${p.client}</span></div>
        <div class="di"><span class="di-l">現場代理人</span><span class="di-v">${p.mgr}</span></div>
        <div class="di"><span class="di-l">分類</span><span class="di-v">${p.cat}</span></div>
        <div class="di"><span class="di-l">現場住所</span><span class="di-v">${p.loc}</span></div>
        <div class="di"><span class="di-l">作業員数</span><span class="di-v">${p.wk}名</span></div>
        <div class="di"><span class="di-l">ステータス</span><span class="stag stag-${p.status}">${SL[p.status]}</span></div>
      </div>
      <div class="db">
        <h4>📊 工期・進捗</h4>
        <div class="di"><span class="di-l">工期</span><span class="di-v">${p.s} ～ ${p.e}</span></div>
        <div class="di"><span class="di-l">進捗率</span><span class="di-v">${p.prog}%</span></div>
        <div class="pbar"><div class="fill" style="width:${p.prog}%;background:${p.status==='delayed'?'#c62828':p.status==='completed'?'#888':'#2e7d32'}"></div></div>
        <h4 style="margin-top:12px;">🚩 マイルストーン</h4>
        ${p.ms.map(m => `<div class="ms-i">${m}</div>`).join('')}
      </div>
      <div class="db">
        <h4>💰 予算</h4>
        <div class="di"><span class="di-l">請負金額</span><span class="di-v">${yen(p.budget)}</span></div>
        <div class="di"><span class="di-l">実行額</span><span class="di-v">${yen(p.spent)}</span></div>
        <div class="di"><span class="di-l">執行率</span><span class="di-v">${p.budget>0?Math.round(p.spent/p.budget*100):0}%</span></div>
        <div class="pbar"><div class="fill" style="width:${p.budget>0?Math.round(p.spent/p.budget*100):0}%;background:#e65100"></div></div>
        <h4 style="margin-top:12px;">📝 備考</h4>
        <div class="nbox">${p.notes}</div>
      </div>
    </div>
  `;

  container.appendChild(popup);
}

function closeDetail() {
  const existing = document.querySelector('.detail-popup');
  if (existing) existing.remove();
  openId = null;
  render();
}

// Tooltip
function showTip(ev, p) {
  const t = document.getElementById('tip');
  t.innerHTML = `<div class="tip-n">${p.name}</div><div class="tip-s">${p.mgr}　${p.cat}　進捗${p.prog}%</div><div class="tip-s">${p.s} ～ ${p.e}</div>`;
  t.classList.add('show');
  mvTip(ev);
}
function mvTip(ev) {
  const t = document.getElementById('tip');
  t.style.left = (ev.clientX + 14) + 'px';
  t.style.top = (ev.clientY - 8) + 'px';
}
document.addEventListener('mousemove', ev => {
  if (document.getElementById('tip').classList.contains('show')) mvTip(ev);
});
function hideTip() { document.getElementById('tip').classList.remove('show'); }

// Filters
document.querySelectorAll('.pill').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filt = b.dataset.f;
    openId = null;
    closeDetail();
    render();
  });
});

// Month nav
document.getElementById('prevM').onclick = () => { vM--; if(vM<0){vM=11;vY--;} openId=null; closeDetail(); render(); };
document.getElementById('nextM').onclick = () => { vM++; if(vM>11){vM=0;vY++;} openId=null; closeDetail(); render(); };

// Resize
window.addEventListener('resize', () => { closeDetail(); render(); });

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

// Init
render(); tick(); setInterval(tick, 30000);
</script>
</body>
</html>
